<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Side Menu</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<button class="open-btn" onclick="openMenu()">
    <i class="fas fa-bars"></i>
</button>

<div class="sidebar" id="sidebar">
    
    <div>
        <div class="header">
            Side Menu
            <span class="close-btn" onclick="closeMenu()">
                <i class="fas fa-times"></i>
            </span>
        </div>

        <ul class="menu">
            <li><i class="fas fa-home"></i> Home</li>
            <li><i class="fas fa-users"></i> Clients</li>
            <li><i class="fas fa-briefcase"></i> Services</li>
            <li><i class="fas fa-cog"></i> Settings</li>
            <li><i class="fas fa-layer-group"></i> Features</li>
            <li><i class="fas fa-user"></i> About us</li>
            <li><i class="fas fa-globe"></i> Languages</li>
            <li><i class="fas fa-envelope"></i> Contact us</li>
        </ul>
    </div>

    <div class="footer">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-github"></i>
        <i class="fab fa-youtube"></i>
    </div>

</div>

<div class="content">
    <h1>
        Animated Side Navigation Menu<br>
        using only HTML and CSS
    </h1>
</div>

<script src="script.js"></script>

</body>
</html>
